
### comyui3d
```yaml
services:
  comfyui-cu124:
    image: yanwk/comfyui-boot:comfy3d-pt25-20250217
    container_name: comfy3d-pt25
    restart: unless-stopped
    network_mode: bridge
    ports:
      - 28883:8188
    volumes:
      - /vol2/1000/Comfyui/comfy3d-pt25:/root
      - /vol2/1000/Comfyui/tmp:/tmp
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: ["gpu"]
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
      CLI_ARGS: ""
      PIP_INDEX_URL: "https://mirrors.cernet.edu.cn/pypi/web/simple"
      HF_ENDPOINT: "https://hf-mirror.com"
      # 挂代理 方便下载无法下载的文件
      http_proxy: "http://192.168.1.130:7890"
      https_proxy: "http://192.168.1.130:7890"
      
```

